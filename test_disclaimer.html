<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Test</title>
</head>
<body>

<div id="overlay" style="position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.8);z-index:9999;display:flex;align-items:center;justify-content:center;padding:20px;">
  <div style="background:white;border-radius:16px;padding:24px;max-width:400px;width:100%;">
    <h2 style="color:#1B3A6B;text-align:center;margin-bottom:16px;">Patient Agreement</h2>
    <p style="font-size:13px;color:#333;line-height:1.6;margin-bottom:16px;">This app is a medication tracking tool only and is not a substitute for professional medical advice. Always follow your surgeon's instructions.</p>
    <div style="display:flex;gap:12px;align-items:flex-start;margin-bottom:16px;">
      <input type="checkbox" id="cb" style="width:28px;height:28px;flex-shrink:0;">
      <label for="cb" style="font-size:13px;color:#333;line-height:1.5;">I understand and agree to follow my surgeon's instructions at all times.</label>
    </div>
    <button id="btn" style="width:100%;padding:16px;border-radius:10px;background:#ccc;color:white;border:none;font-size:15px;font-weight:700;">I Understand — Continue</button>
  </div>
</div>

<div id="app" style="display:none;padding:20px;">
  <h1 style="color:#1B3A6B;">App Loaded Successfully!</h1>
  <p>The disclaimer worked correctly.</p>
</div>

<script>
var cb  = document.getElementById('cb');
var btn = document.getElementById('btn');
var overlay = document.getElementById('overlay');
var app = document.getElementById('app');

cb.addEventListener('change', function() {
  btn.style.background = cb.checked ? '#1B3A6B' : '#ccc';
  btn.style.cursor = cb.checked ? 'pointer' : 'default';
});

btn.addEventListener('click', function() {
  if (!cb.checked) {
    alert('Please check the box first.');
    return;
  }
  overlay.style.display = 'none';
  app.style.display = 'block';
});
</script>

</body>
</html>
